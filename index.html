<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konversi Suhu Celcius ke Fahrenheit</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            display: grid;
            gap: 25px;
        }

        h1 {
            font-size: 20px;
            color: #333;
            text-align: center;
            text-transform: capitalize;
        }

        .input-group{
            display: grid;
            gap: 5px;
        }


        label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #007bff;
            outline: none;
        }

        input[readonly] {
            background-color: #e9ecef;
            color: #495057;
            font-weight: bold;
            border-color: #ced4da;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:active {
            transform: scale(0.98);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: center;
        }

        th, td {
            border: 1px solid #ced4da;
            padding: 10px;
        }

        th {
            background-color: #e4d1d1;
            color: #333;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

    </style>
    </head>
<body>

    <form class="container" id="form-suhu">
        <h1>Mengubah Suhu Celcius ke Fahrenheit</h1>
        
        <div class="input-group">
            <label for="input-suhu">Masukkan suhu (&deg;C)</label>
            <input type="number" id="input-suhu" step="any" placeholder="Contoh: 36.5" name="inputSuhu">
        </div>
        
        <button type="Submit" id="submit">Konversi Sekarang</button>

        <div class="input-group">
            <label>Riwayat Hasil Konversi</label>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Celcius (&deg;C)</th>
                            <th>Fahrenheit (&deg;F)</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-hasil">
                    </tbody>
                </table>
            </div>
        </div>
    </form>

    <script>
        function celciusToFarenheit(input){
            return (input * 9/5) + 32
        }

        const formSuhu = document.getElementById('form-suhu')
        const result = document.getElementById('tabel-hasil')
        let no = 1

        formSuhu.addEventListener('submit', function (e) {
            e.preventDefault();

            const form = new FormData(formSuhu)
            if (form.get('inputSuhu') === ""){
                alert('suhu harus diisi')
                return
            }
            const hasilKonversi = celciusToFarenheit(parseFloat(form.get('inputSuhu')))

            const barisTable = document.createElement('tr')
            const kolomNo = document.createElement('td')
            kolomNo.innerText = no++
            const kolomInputSuhu = document.createElement('td')
            kolomInputSuhu.innerText = form.get('inputSuhu')
            const kolomResult = document.createElement('td')
            kolomResult.innerText = hasilKonversi.toFixed(2)

            barisTable.append(kolomNo)
            barisTable.append(kolomInputSuhu)
            barisTable.append(kolomResult)

            result.append(barisTable)

            formSuhu.reset()
        })
    </script>
</body>
</html>
